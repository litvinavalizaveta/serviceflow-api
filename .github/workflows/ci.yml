name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.300

      - name: Restore
        run: dotnet restore ServiceFlow.slnx

      - name: Build
        run: dotnet build ServiceFlow.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test ServiceFlow.slnx --no-build --configuration Release

      - name: Format verification
        run: dotnet format ServiceFlow.slnx --verify-no-changes --no-restore
